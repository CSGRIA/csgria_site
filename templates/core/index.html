<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CSGRIA - Comité de Recherche sur l’IA au Gabon{% endblock %}</title>
    <meta name="description" content="CSGRIA est le Comité de recherche sur l’intelligence artificielle au Gabon. Nous développons des projets en IA, data science et innovation technologique pour le progrès scientifique en Afrique.">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fr">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    <link rel="icon" href="{% static 'imgs/favicon.ico' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'imgs/logo.svg' %}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="CSGRIA - Intelligence Artificielle au Gabon">
    <meta property="og:description" content="Recherche et innovation en intelligence artificielle, data science et technologie en Afrique.">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="{% static 'imgs/logo.svg' %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CSGRIA - IA au Gabon">
    <meta name="twitter:description" content="Recherche et innovation en intelligence artificielle et data science en Afrique.">
    <meta name="twitter:image" content="{% static 'imgs/logo.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/core/index.css' %}">
    {% block style %}{% endblock %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CSGRIA",
      "url": "{{ request.build_absolute_uri }}",
      "description": "Comité de recherche sur l’intelligence artificielle au Gabon",
      "sameAs": []
    }
    </script>
</head>
<body>
    {% include 'core/includes/_nav.html' %}
    <main>{% block content %}{% endblock %}</main>
    {% include 'core/includes/_footer.html' %}
</body>
</html>
