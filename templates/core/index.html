<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CSGR-IA{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            /* GREEN */
            --green-50:  #E6FAF4;
            --green-100: #A8EDD4;
            --green-500: #00C07A;
            --green-800: #006641;

            /* BLUE */
            --blue-50:   #EBF5FF;
            --blue-100:  #B3D9FF;
            --blue-500:  #0078D4;
            --blue-800:  #003A6B;

            /* NEUTRALS */
            --white:      #FFFFFF;
            --soft-white: #F7FAFB;
            --navy:       #0A1628;
            --text-dark:  #1A2942;
            --text-mid:   #3D5175;
            --text-light: #64748B;
            --border:     #E2EBF4;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--white);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        *::-webkit-scrollbar{
            width: 0px;
        }
        main { flex: 1; }
    </style>
    {% block style %}{% endblock %}
</head>
<body>
    {% include 'core/includes/_nav.html' %}
    <main>{% block content %}{% endblock %}</main>
    {% include 'core/includes/_footer.html' %}
</body>
</html>
